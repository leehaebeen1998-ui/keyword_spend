# Google Ads 보고서 에디터 셀렉터
# https://ads.google.com
# ※ _ngcontent-awn-GINSU-* 클래스는 빌드마다 변경됨 — 절대 사용 금지
# ※ aria-label / role / 커스텀 엘리먼트명 / 안정 클래스 기반 셀렉터만 사용

base_url: "https://ads.google.com"

# ── 로그인 확인 ──────────────────────────────────────────────────────────────
login:
  login_url_patterns:
    - "accounts.google.com"
  # ※ ads.google.com/nav/selectaccount 는 로그인된 상태에서 표시되므로 제거
  login_element_selector: "input[type='email'], input[type='password']"

# ── 최초 Google Ads 고객 ID 선택 화면 ───────────────────────────────────────
# 로그인 완료 후 /nav/selectaccount 화면에서 표시됨.
# 실제 DOM (HTML 분석 결과):
#   <material-spinner aria-label="Google Ads 계정 선택"> (로딩 중)
#   CSS 클래스: .selection-header-old / .selection-header-new (헤딩)
#   <material-list-item class="user-customer-list-item"> (계정 항목)
#   <span class="material-list-item-secondary">280-084-0035</span> (계정 ID)
account_selection:
  # URL 패턴으로 감지 (가장 신뢰도 높음)
  url_pattern: "selectaccount"
  # DOM 감지: material-spinner aria-label 또는 CSS 클래스 기반
  heading: "[aria-label='Google Ads 계정 선택'], .selection-header-old, .selection-header-new"
  item: "material-list-item[class*='user-customer-list-item']"
  account_name: ".customer-name"
  account_id: ".material-list-item-secondary"

# ── 계정 전환 (MCC → 광고주 계정) ───────────────────────────────────────────
# 확인된 HTML (Screenshot 2):
#   <material-gaia-picker ...>
#     <div class="trigger ..." popupsource aria-haspopup="true">
#       <img class="trigger-photo ..." alt="Google 계정 (whdxkr5974@gmail.com)">
#     </div>
#   </material-gaia-picker>
# 계정 목록 (Screenshot 3):
#   <customer-item ...>
#     <div class="description ...">
#       <div class="line-1 ..."><span class="name ...">법무법인태하_01_형사</span></div>
#       <div class="line-2 ...">...</div>
#     </div>
#   </customer-item>
account_switch:
  # 상단 계정 아이콘 (클릭 → 계정 목록 팝업 오픈)
  trigger: "material-gaia-picker .trigger[aria-haspopup='true'], img.trigger-photo, [aria-label*='Google 계정']"

  # 계정 목록 팝업 내 계정명 (account_name 텍스트로 매칭)
  # stable: span.name (커스텀 엘리먼트 customer-item 의 자식)
  account_name_span: "customer-item span.name"

  # 계정 전환 확인 버튼 (선택 후 클릭)
  switch_button: "button:has-text('계정 전환'), [role='button']:has-text('계정 전환')"

  # 현재 계정 표시 (이미 해당 계정인지 확인)
  # 상단바: "491-790-2254 법무법인태하_01..."
  current_account_label: "[aria-label*='계정 이름'], .customer-name, material-gaia-picker img[alt*='@']"

# ── 보고서 이동 ──────────────────────────────────────────────────────────────
report:
  # 보고서 에디터 URL (직접 이동 시 사용)
  # 확인된 URL: /aw/reporteditor?ocid=5321530318&workspaceid=...
  report_editor_url_suffix: "/aw/reporteditor"

  # 사이드바 "보고서 에디터" 링크
  # 확인된 HTML: <a ... title="보고서 에디터" href="/aw/reporteditor?...">
  sidebar_stats_section: "div[popupsource]:has-text('통계 및 보고서'), a:has-text('통계 및 보고서')"
  sidebar_report_editor: "a[title='보고서 에디터'], a[href*='reporteditor']"

  # 저장된 보고서 목록 내 보고서명 span
  # 확인된 HTML: <span class="... report-name-text ...">일별 캠페인 소진액</span>
  report_list_link: "span.report-name-text, [class*='report-name'] span, table td span"

# ── 날짜 범위 ────────────────────────────────────────────────────────────────
period:
  # 날짜 범위 버튼
  # 확인된 aria-label 패턴: "2026년 6월 8일 ~ 14일 기간 선택"
  date_range_button: "[role='button'][aria-label*='기간 선택'], dropdown-button.primary-range [role='button'], [aria-label*='날짜 범위']"

  # "맞춤" (Custom) 옵션
  custom_range_option: "text=맞춤, [data-value='CUSTOM'], [role='option']:has-text('맞춤'), li:has-text('맞춤')"

  # 날짜 입력 필드 (맞춤 기간 선택 시)
  start_input: "input[aria-label*='시작'], input[placeholder*='시작'], [class*='start-date'] input, input[name*='startDate']"
  end_input:   "input[aria-label*='종료'], input[placeholder*='종료'], [class*='end-date'] input, input[name*='endDate']"

  # 적용 버튼
  apply_button: "button:has-text('적용'), [role='button']:has-text('적용'), button:has-text('확인')"

# ── 필터 바 ──────────────────────────────────────────────────────────────────
filters:
  # 실제 DOM: <material-chip class="predicateEditorChip ...">...<span>캠페인 상태:: 전체</span>
  campaign_status_chip: "material-chip.predicateEditorChip:has-text('캠페인 상태'), material-chip:has-text('캠페인 상태')"
  adgroup_status_chip:  "material-chip.predicateEditorChip:has-text('광고그룹 상태'), material-chip:has-text('광고그룹 상태')"
  # 필터 전체 초기화 버튼 (가장 간단 — 이 버튼 하나로 모든 필터 리셋)
  reset_button: "button:has-text('재설정'), [role='button']:has-text('재설정')"
  # 드롭다운 옵션: material-select-item 또는 일반 listitem
  all_option: "material-select-item[role='option']:has-text('전체'), material-select-item:has-text('전체'), [role='option']:has-text('전체')"
  apply_button: "button:has-text('적용'), [role='button']:has-text('적용'), button:has-text('확인')"
  bad_status_text: "사용중"
  good_status_text: "전체"

# ── 다운로드 ────────────────────────────────────────────────────────────────
download:
  # 다운로드 아이콘 버튼 (팝업 메뉴 포함)
  # 확인된 HTML: <material-button aria-label="다운로드" aria-haspopup="true" ...>
  button: "material-button[aria-label='다운로드']"
  button_fallback: "[role='button'][aria-label='다운로드'], button[aria-label='다운로드']"

  # 팝업 메뉴에서 Excel .csv 포맷 선택
  # 실제 화면: .csv / Excel .csv / .tsv / .xml / ...
  # "Excel .csv" 우선, 없으면 ".csv" 선택
  # 실제 DOM: <material-list-item role="listitem">Excel .csv</material-list-item>
  format_excel: "material-list-item:has-text('Excel .csv'), [role='listitem']:has-text('Excel .csv')"
  format_csv:   "material-list-item:has-text('.csv'):not(:has-text('Excel')), [role='listitem']:has-text('.csv')"

  timeout_sec: 90
